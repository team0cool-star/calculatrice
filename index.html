<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pic & Coud - Scientifique</title>

    <!-- Icônes pour le mobile -->
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="apple-touch-icon" href="icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('picetcoud.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* Utilisation du dvh (Dynamic Viewport Height) pour éviter que les barres mobiles masquent le bas */
            height: 100vh;
            height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .calculator {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
            /* S'assure que la calculatrice ne dépasse jamais de l'écran disponible */
            max-height: 95vh; 
            max-height: 95dvh;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .screen {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 20px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 110px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .previous-operand {
            color: #777;
            font-size: 1.1rem;
            min-height: 24px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .current-operand {
            color: #222;
            font-size: 2.2rem;
            font-weight: bold;
            word-wrap: break-word;
            word-break: break-all;
            margin-top: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 15px;
            flex-grow: 1;
        }

        button {
            border: none;
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 15px 5px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active {
            transform: scale(0.95);
            background-color: rgba(0, 0, 0, 0.1);
        }

        button.operator {
            background-color: rgba(212, 163, 115, 0.4);
            color: #8b5a2b;
        }

        button.clear, button.delete {
            background-color: rgba(230, 57, 70, 0.1);
            color: #e63946;
        }

        button.span-two {
            grid-column: span 2;
        }

        button.equals {
            background-color: #d4a373;
            color: white;
        }
        
        button.equals:active {
            background-color: #b98555;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="screen">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand">0</div>
        </div>
        <div class="buttons">
            <button onclick="clearScreen()" class="clear span-two">AC</button>
            <button onclick="deleteNumber()" class="delete">DEL</button>
            <button onclick="appendOperator('/')" class="operator">÷</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button onclick="appendOperator('*')" class="operator">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="appendOperator('-')" class="operator">-</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendOperator('+')" class="operator">+</button>
            
            <button onclick="appendNumber('.')">.</button>
            <button onclick="appendNumber('0')">0</button>
            <button onclick="compute()" class="equals span-two">=</button>
        </div>
    </div>

    <script>
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;

        const currentDisplay = document.getElementById('current-operand');
        const previousDisplay = document.getElementById('previous-operand');

        function updateDisplay() {
            currentDisplay.innerText = currentOperand;
            if (operation != null) {
                previousDisplay.innerText = `${previousOperand} ${getOperatorSymbol(operation)}`;
            } else {
                previousDisplay.innerText = '';
            }
        }

        function getOperatorSymbol(op) {
            if (op === '*') return '×';
            if (op === '/') return '÷';
            return op;
        }

        function appendNumber(number) {
            if (number === '.' && currentOperand.includes('.')) return;
            if (currentOperand === '0' && number !== '.') {
                currentOperand = number.toString();
            } else {
                currentOperand = currentOperand.toString() + number.toString();
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentOperand === '') return;
            if (previousOperand !== '') {
                compute();
            }
            operation = op;
            previousOperand = currentOperand;
            currentOperand = '';
            updateDisplay();
        }

        function clearScreen() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
            updateDisplay();
        }

        function deleteNumber() {
            if (currentOperand === '0') return;
            currentOperand = currentOperand.toString().slice(0, -1);
            if (currentOperand === '') currentOperand = '0';
            updateDisplay();
        }

        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;
            switch (operation) {
                case '+': computation = prev + current; break;
                case '-': computation = prev - current; break;
                case '*': computation = prev * current; break;
                case '/': computation = prev / current; break;
                default: return;
            }
            currentOperand = computation.toString();
            operation = undefined;
            previousOperand = '';
            updateDisplay();
        }
    </script>
</body>
</html>
