<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pic & Coud - Scientifique</title>
    
    <!-- Icônes pour le mobile -->
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="apple-touch-icon" href="icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            /* Superbe dégradé beige en fond d'écran général */
            background: linear-gradient(135deg, #e6dfd3 0%, #f4f0e6 50%, #eae3d2 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom); /* AJOUTEZ CETTE LIGNE ICI */
        }
        }

        .calculator-container {
            text-align: center;
            width: 100%;
            max-width: 460px;
            padding: 30px 25px 25px 25px;
            margin: 20px;
            
            /* --- CONFIGURATION DU LOGO EN FOND PAR TRANSPARENCE --- */
            background-image: url('picetcoud.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain; /* Permet au logo de s'adapter sans être rogné */
            background-color: rgba(245, 240, 230, 0.75); /* Voile beige très léger pour lier le fond et l'image */
            background-blend-mode: overlay; /* Fusionne magnifiquement l'image et le fond du boîtier */
            
            border: 2px solid rgba(163, 132, 93, 0.4);
            border-radius: 26px;
            box-shadow: 0 20px 50px rgba(100, 90, 80, 0.25);
        }

        /* Écran transparent style "Verre d'argile" */
        #txtDisplay {
            color: #3d3228; /* Chiffres très sombres pour une lisibilité parfaite sur l'image */
            text-align: right;
            font-size: 30pt;
            font-family: 'Consolas', monospace;
            width: 100%;
            height: 75px;
            padding: 0 15px;
            margin-bottom: 25px;
            border: 2px solid #a3845d;
            border-radius: 14px;
            
            /* Fond translucide légèrement opaque pour isoler l'écran du logo en fond */
            background-color: rgba(238, 233, 222, 0.85); 
            box-shadow: inset 0 3px 8px rgba(100, 90, 80, 0.2);
            outline: none;
        }

        /* Grille des touches */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
        }

        /* Boutons Chiffres : Très transparents avec texte contrasté */
        .btn {
            height: 65px;
            font-size: 20pt;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid rgba(92, 82, 71, 0.4);
            border-radius: 16px;
            background-color: rgba(255, 255, 255, 0.25); /* Ultra transparent pour voir l'image derrière */
            color: #3d3228; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            user-select: none;
            backdrop-filter: blur(2px);
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.6);
            border-color: rgba(92, 82, 71, 0.8);
        }

        .btn:active {
            transform: scale(0.93); 
        }

        /* Touches Scientifiques (Taupe transparent) */
        .btn-sci {
            background-color: rgba(215, 205, 189, 0.35);
            color: #4a3e31;
            border: 2px solid rgba(125, 110, 93, 0.5);
            font-size: 16pt;
        }
        .btn-sci:hover {
            background-color: rgba(215, 205, 189, 0.7);
        }

        /* Opérateurs (Caramel transparent) */
        .btn-op {
            background-color: rgba(212, 184, 148, 0.35);
            color: #876131;
            border: 2px solid rgba(212, 184, 148, 0.8);
        }
        .btn-op:hover {
            background-color: rgba(212, 184, 148, 0.7);
            color: #3d3228;
        }

        /* Touche C d'effacement (Terracotta transparent) */
        .btn-clear {
            background-color: rgba(214, 131, 112, 0.25);
            color: #9c3f2b;
            border: 2px solid rgba(214, 131, 112, 0.7);
        }
        .btn-clear:hover {
            background-color: rgba(214, 131, 112, 0.6);
            color: #fff;
        }

        /* Bouton Égal */
        #btnEqual {
            grid-column: span 4; 
            height: 60px;
            font-size: 24pt;
            margin-top: 5px;
            background: linear-gradient(90deg, rgba(195, 166, 129, 0.9), rgba(163, 132, 93, 0.9));
            color: #ffffff;
            border: 2px solid #a3845d;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(163, 132, 93, 0.2);
            transition: all 0.2s ease;
        }
        
        #btnEqual:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(163, 132, 93, 0.4);
        }
        
        #btnEqual:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        
        <input type="text" id="txtDisplay" value="0" readonly>
        
        <div class="grid">
            <div class="btn btn-sci" onclick="calcScientific('sin')">sin</div>
            <div class="btn btn-sci" onclick="calcScientific('cos')">cos</div>
            <div class="btn btn-sci" onclick="calcScientific('tan')">tan</div>
            <div class="btn btn-sci" onclick="insertValue(Math.PI.toFixed(6))">π</div>

            <div class="btn btn-sci" onclick="calcScientific('square')">x²</div>
            <div class="btn btn-sci" onclick="calcScientific('root')">√</div>
            <div class="btn btn-sci" onclick="insertValue('(')">(</div>
            <div class="btn btn-sci" onclick="insertValue(')')">)</div>

            <div class="btn" onclick="insertValue('7')">7</div>
            <div class="btn" onclick="insertValue('8')">8</div>
            <div class="btn" onclick="insertValue('9')">9</div>
            <div class="btn btn-op" onclick="insertValue('*')">×</div>

            <div class="btn" onclick="insertValue('4')">4</div>
            <div class="btn" onclick="insertValue('5')">5</div>
            <div class="btn" onclick="insertValue('6')">6</div>
            <div class="btn btn-op" onclick="insertValue('-')">-</div>

            <div class="btn" onclick="insertValue('1')">1</div>
            <div class="btn" onclick="insertValue('2')">2</div>
            <div class="btn" onclick="insertValue('3')">3</div>
            <div class="btn btn-op" onclick="insertValue('+')">+</div>

            <div class="btn btn-clear" onclick="clearValue()">C</div>
            <div class="btn" onclick="insertValue('0')">0</div>
            <div class="btn" onclick="insertValue('.')">.</div>
            <div class="btn btn-op" onclick="insertValue('/')">÷</div>
            
            <button id="btnEqual" onclick="evalStatement()">=</button>
        </div>
    
    </div>

    <script>
        let isClear = true;

        function insertValue(value) {
            const display = document.getElementById("txtDisplay");
            if (isClear) {
                display.value = value;
                isClear = false;
            } else {
                display.value += value;
            }
        }

        function clearValue() {
            document.getElementById("txtDisplay").value = "0";
            isClear = true;
        }

        function evalStatement() {
            const display = document.getElementById("txtDisplay");
            try {
                let result = new Function("return " + display.value)();
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(6));
                }
                display.value = result;
            } catch(e) {
                display.value = "Erreur";
            }
            isClear = true;
        }

        function calcScientific(type) {
            const display = document.getElementById("txtDisplay");
            let currentVal;
            try {
                currentVal = new Function("return " + display.value)();
            } catch(e) {
                display.value = "Erreur";
                isClear = true;
                return;
            }

            let result;
            switch(type) {
                case 'sin':
                    result = Math.sin(currentVal * Math.PI / 180);
                    break;
                case 'cos':
                    result = Math.cos(currentVal * Math.PI / 180);
                    break;
                case 'tan':
                    result = Math.tan(currentVal * Math.PI / 180);
                    break;
                case 'square':
                    result = Math.pow(currentVal, 2);
                    break;
                case 'root':
                    if (currentVal < 0) {
                        result = "Erreur";
                    } else {
                        result = Math.sqrt(currentVal);
                    }
                    break;
            }

            if (typeof result === 'number' && result % 1 !== 0) {
                result = parseFloat(result.toFixed(6));
            }

            display.value = result;
            isClear = true;
        }
    </script>
</body>
</html>
